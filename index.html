<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="shortcut icon" href="./assets/dinheiro.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <title>Conversor de Moedas</title>
</head>

<body>
    <section>

        <div class="container-01">
            <img class="img-dinheiro" src="./assets/dinheiro.png" alt="Dinheiro" width="40px">
            <h1>Conversor <br> <span>de Moeda</span></h1>
            <p class="paragraph">Converta moedas internacionais em tempo real com as melhores taxas do mercado.</p>
            <img class="logo-central" src="./assets/Logo conversor de moedas.png" alt="Logo do Conversor de Moeda"
                width="200px">
        </div>

        <div class="container-02">
            <!-- AQUI TEMOS O PRIMEIRO SELECT -->
            <label for="">
                De
                <select id="SelectUM" onchange="PRIMEIROSELECT()">
                    <option value="AOA">Kwanza Angolano (KZ)</option>
                    <option value="USD">Dólar Americano (USD)</option>
                    <option value="EUR">Euro (EUR)</option>
                    <option value="BRL">Real Brasileiro (BRL)</option>
                </select>
            </label>

            <img class="swap_horizontal"
                src="./assets/swap_horizontal_circle_40dp_199C71_FILL0_wght400_GRAD0_opsz40.png"
                alt="Logo de conversão de moedas" class="swap_horizontal">
            <!-- AQUI TEMOS O SEGUNDO SELECT -->
            <label>
                Para
                <select id="SelectDois" onchange="SEGUNDOSELECT()">
                    <option value="USD">Dólar Americano (USD)</option>
                    <option value="EUR">Euro (EUR)</option>
                    <option value="BRL">Real Brasileiro (BRL)</option>
                    <option value="AOA">Kwanza Angolano (KZ)</option>
                </select>
            </label>
            <!-- AQUI TENHO O MEU INPUT -->
            <input type="text" placeholder=" 0,000" id="input">
            <!-- AQUI TENHO O MEU BOTÃO DE CONVERSÃO -->
            <button class="Convert-button" onclick="CONVERTERVALORES()">Convert now</button>

            <div class="all-results">

                <div class="countries">
                    <!-- PRIMEIRA IMAGEM -->
                    <div class="only01">
                        <img class="CasoUm" src="./assets/ANGOLA.png" alt="Bandeira de Angola" width="50px">
                        <p id="paragrafo1" class="Paragrafo1">KZ000.00</p>
                    </div>
                    <!-- IMAGEM DO CONVERSOR -->
                    <img src="assets/image-conversor.png" alt="image conversor" class="logo-conversor" id="IMGconvert">
                    <!-- SEGUNDA IMAGEM -->
                    <div class="only02">
                        <img id="bandeiraUsa" src="./assets/USA.png" alt="Bandeira do Estados Unidos" width="50px">
                        <p id="paragrafo2" class="Paragrafo2">$ 000.00</p>
                    </div>
                </div>
            </div>

        </div>
</body>
<script src="script.js"></script>

</html>
